<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Site</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: #2d3748;
        }
        p {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 24px;
            border-radius: 24px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status {
            margin-top: 24px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #48bb78;
        }
        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">Deployed via Jenkins</span>
        <h1>Hello from Revanth Damavarapu!</h1>
        <p>This static site was built and deployed to AWS S3 using a Jenkins pipeline.</p>
        <div class="status">&#10003; Site is live</div>
    </div>
</body>
</html>
